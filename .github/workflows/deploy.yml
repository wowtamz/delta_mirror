name: Continuous Deployment

on:
  push:
    branches:
      - main
      - dev
      - release/*
  pull_request:
      - main
      - dev
      - release/*

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      image: debian:stable-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            cmake \
            libwxgtk3.2-dev

      - name: Build
        run: make

      - name: Run tests
        run: make test

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libwxgtk3.2-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install wxwidgets

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          vcpkg install wxwidgets:x64-windows-static
          echo "CMAKE_ARGS=-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV

      - name: Build
        run: make

      - name: Package unix binaries
        if: runner.os != 'Windows'
        run: |
          cd build
          tar -czf dmirror_${{ runner.os }}.tar.gz bin

      - name: Package Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/* -DestinationPath build/dmirror_${{ runner.os }}.zip

      - name: Upload unix binaries
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: dmirror_${{ runner.os }}
          path: build/dmirror_${{ runner.os }}.tar.gz
          if-no-files-found: error

      - name: Upload Windows binaries
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: dmirror_${{ runner.os }}
          path: build/dmirror_${{ runner.os }}.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
